# Netlify — monorepo: only the Vite app in /frontend is the static site.
# In the Netlify UI, you can leave defaults; this file overrides them when present.

[build]
  base = "frontend"
  command = "npm run build"
  publish = "dist"

# React Router (SPA): serve index.html for all routes so refresh/deep links work.
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[build.environment]
  NODE_VERSION = "20"
