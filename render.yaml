# Render Blueprint — backend API (monorepo: service root is /backend)
# Docs: https://render.com/docs/blueprint-spec
#
# Manual Web Service:
#   Root Directory = backend | Build = npm install | Start = npm start
#
# Required env vars (Dashboard → Environment). Without these the app exits with a checklist:
#   MONGO_URI            — MongoDB Atlas connection string; Atlas Network Access allow 0.0.0.0/0 (or Render IPs)
#   JWT_SECRET           — 32+ random chars (Blueprint can generate)
#   JWT_REFRESH_SECRET   — 32+ random chars (different from JWT_SECRET)
#   CLIENT_URL           — https://your-app.netlify.app (CORS + emails)
#   SOCKET_CORS_ORIGIN   — same as CLIENT_URL (Socket.io)
#
# Netlify (redeploy after change):
#   VITE_API_URL         — https://<service>.onrender.com/api
#   VITE_SOCKET_URL      — https://<service>.onrender.com

services:
  - type: web
    name: nurishhub-api
    runtime: node
    region: oregon
    plan: free
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: NODE_VERSION
        value: "20"
      - key: TRUST_PROXY
        value: "1"
      - key: MONGO_URI
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: JWT_REFRESH_EXPIRES_IN
        value: 30d
      - key: CLIENT_URL
        sync: false
      - key: SOCKET_CORS_ORIGIN
        sync: false
      - key: SWAGGER_ENABLED
        value: "false"
